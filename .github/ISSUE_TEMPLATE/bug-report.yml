name: Bug report
description: Report a reproducible product or engineering defect.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include secrets, customer data, or sensitive model output.
  - type: textarea
    id: outcome
    attributes:
      label: Observed outcome
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest safe sequence that reproduces the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Commit SHA or deployed version.
  - type: textarea
    id: context
    attributes:
      label: Safe diagnostic context
      description: Include redacted request IDs, logs, or screenshots if useful.
