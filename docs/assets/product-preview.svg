<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="810" viewBox="0 0 1440 810" role="img" aria-labelledby="title desc">
  <title id="title">ResolveAI support workspace</title>
  <desc id="desc">A support inbox with ticket navigation, customer conversation, approved knowledge, and a human-reviewed AI draft.</desc>
  <rect width="1440" height="810" rx="24" fill="#f5f7f4"/>
  <rect width="220" height="810" fill="#0a3c2c"/>
  <g font-family="Arial, sans-serif">
    <text x="32" y="54" fill="#fff" font-size="24" font-weight="700">resolve<tspan fill="#a9dabd">ai</tspan></text>
    <rect x="20" y="92" width="180" height="44" rx="10" fill="#245544"/>
    <text x="54" y="120" fill="#fff" font-size="14">Inbox</text><text x="170" y="120" fill="#b9d0c5" font-size="12">12</text>
    <text x="54" y="170" fill="#adc3b8" font-size="14">AI review</text><text x="54" y="220" fill="#adc3b8" font-size="14">Knowledge</text><text x="54" y="270" fill="#adc3b8" font-size="14">Insights</text>
    <rect x="238" y="26" width="304" height="758" rx="14" fill="#fbfcfa" stroke="#dde5df"/>
    <text x="264" y="64" fill="#718078" font-size="9" letter-spacing="2">WORKSPACE</text><text x="264" y="93" fill="#18211d" font-family="Georgia, serif" font-size="27">Support inbox</text>
    <rect x="254" y="122" width="272" height="80" rx="11" fill="#fff" stroke="#dde5df"/><text x="288" y="152" fill="#18211d" font-size="19" font-weight="700">12</text><text x="282" y="177" fill="#718078" font-size="10">Open</text><text x="382" y="152" fill="#18211d" font-size="19" font-weight="700">4</text><text x="377" y="177" fill="#718078" font-size="10">Mine</text><text x="471" y="152" fill="#18211d" font-size="19" font-weight="700">3</text><text x="454" y="177" fill="#718078" font-size="10">AI ready</text>
    <rect x="250" y="220" width="280" height="150" rx="12" fill="#fff" stroke="#dde5df"/><rect x="250" y="238" width="4" height="114" rx="2" fill="#124f3b"/><rect x="272" y="242" width="52" height="19" rx="9" fill="#fbe5df"/><text x="283" y="255" fill="#b54f3c" font-size="8" font-weight="700">URGENT</text><text x="272" y="288" fill="#18211d" font-size="13" font-weight="700">Team members cannot access</text><text x="272" y="309" fill="#18211d" font-size="13" font-weight="700">our workspace</text><text x="272" y="337" fill="#718078" font-size="10">Lena Ortiz · Atlas Coffee</text>
    <rect x="250" y="382" width="280" height="132" rx="12" fill="none"/><text x="272" y="414" fill="#9b681b" font-size="9" font-weight="700">HIGH</text><text x="272" y="446" fill="#18211d" font-size="13" font-weight="700">Webhook deliveries are arriving twice</text><text x="272" y="475" fill="#718078" font-size="10">Andre Silva · Fieldwork</text>
    <text x="584" y="58" fill="#718078" font-size="9" letter-spacing="1">#1048  •  OPEN</text><text x="584" y="91" fill="#18211d" font-family="Georgia, serif" font-size="27">Team members cannot access our workspace</text>
    <line x1="558" y1="112" x2="1418" y2="112" stroke="#dde5df"/>
    <circle cx="604" cy="178" r="18" fill="#e1e9e3"/><text x="595" y="182" fill="#315244" font-size="9" font-weight="700">LO</text><text x="634" y="160" fill="#18211d" font-size="11" font-weight="700">Lena Ortiz</text><rect x="634" y="174" width="480" height="82" rx="13" fill="#f4f7f4" stroke="#e6ece7"/><text x="654" y="200" fill="#46554d" font-size="11">We upgraded this morning, but every invitation still opens an</text><text x="654" y="220" fill="#46554d" font-size="11">expired-link page. We have onboarding in two hours.</text>
    <circle cx="646" cy="303" r="18" fill="#d3eadb"/><text x="637" y="307" fill="#164c39" font-size="9" font-weight="700">MC</text><text x="676" y="285" fill="#18211d" font-size="11" font-weight="700">Maya Chen</text><rect x="676" y="299" width="438" height="64" rx="13" fill="#eef6f1" stroke="#dcebe1"/><text x="696" y="326" fill="#46554d" font-size="11">I’m checking the workspace provisioning event now.</text><text x="696" y="345" fill="#46554d" font-size="11">I’ll confirm the safest next step shortly.</text>
    <rect x="578" y="414" width="556" height="300" rx="14" fill="#fff" stroke="#cfe3d6"/><rect x="578" y="414" width="556" height="42" rx="14" fill="#f4f9f5"/><text x="598" y="440" fill="#124f3b" font-size="10" font-weight="700">✦  AI DRAFT</text><text x="970" y="440" fill="#718078" font-size="9">86% confidence · Review required</text><text x="600" y="488" fill="#46554d" font-size="11">Hi Lena,</text><text x="600" y="520" fill="#46554d" font-size="11">I understand the timing is important with onboarding coming up.</text><text x="600" y="541" fill="#46554d" font-size="11">Before changing access, I’m verifying that the plan-upgrade billing</text><text x="600" y="562" fill="#46554d" font-size="11">event completed successfully. Once confirmed, an administrator can</text><text x="600" y="583" fill="#46554d" font-size="11">revoke the expired invitations and send fresh links.</text><line x1="578" y1="654" x2="1134" y2="654" stroke="#dde5df"/><text x="600" y="684" fill="#718078" font-size="9">Grounded in 2 approved sources</text><rect x="1010" y="667" width="104" height="31" rx="8" fill="#124f3b"/><text x="1032" y="687" fill="#fff" font-size="9" font-weight="700">Approve draft</text>
    <rect x="1160" y="132" width="248" height="180" rx="12" fill="#fff" stroke="#dde5df"/><text x="1182" y="160" fill="#718078" font-size="9" letter-spacing="1">CUSTOMER</text><circle cx="1206" cy="202" r="23" fill="#e1e9e3"/><text x="1195" y="206" fill="#315244" font-size="10" font-weight="700">LO</text><text x="1242" y="197" fill="#18211d" font-family="Georgia, serif" font-size="18">Lena Ortiz</text><text x="1242" y="216" fill="#718078" font-size="9">Atlas Coffee</text><text x="1182" y="260" fill="#718078" font-size="9">Plan</text><text x="1368" y="260" text-anchor="end" fill="#18211d" font-size="9" font-weight="700">Scale</text><text x="1182" y="284" fill="#718078" font-size="9">Lifetime value</text><text x="1368" y="284" text-anchor="end" fill="#18211d" font-size="9" font-weight="700">$18,420</text>
    <rect x="1160" y="330" width="248" height="278" rx="12" fill="#fff" stroke="#dde5df"/><text x="1182" y="358" fill="#718078" font-size="9" letter-spacing="1">AI CONTEXT</text><text x="1182" y="386" fill="#18211d" font-family="Georgia, serif" font-size="18">Relevant knowledge</text><rect x="1176" y="408" width="216" height="80" rx="9" fill="#fbfcfa" stroke="#dde5df"/><text x="1192" y="432" fill="#18211d" font-size="10" font-weight="700">Resetting expired invitations</text><text x="1192" y="454" fill="#718078" font-size="8">Approved workspace documentation</text><text x="1192" y="474" fill="#124f3b" font-size="8" font-weight="700">✓ APPROVED SOURCE</text><rect x="1176" y="500" width="216" height="80" rx="9" fill="#fbfcfa" stroke="#dde5df"/><text x="1192" y="524" fill="#18211d" font-size="10" font-weight="700">Plan upgrades &amp; provisioning</text><text x="1192" y="546" fill="#718078" font-size="8">Approved billing documentation</text><text x="1192" y="566" fill="#124f3b" font-size="8" font-weight="700">✓ APPROVED SOURCE</text>
  </g>
</svg>
